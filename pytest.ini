[pytest]
# Pytest Configuration for Talent Acquisition Accelerator
# Reference: 17_testing_strategy.md

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=agents --cov=shared --cov-report=html
[coverage:run]
source = agents,shared
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Markers
markers =
    unit: Unit tests for individual functions/methods
    integration: Integration tests for multi-component workflows
    slow: Tests that take longer than 1 second
    aws: Tests that require AWS services (skip in CI without credentials)

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (requires pytest-timeout)
# timeout = 300
# timeout_method = thread
